<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMM VÁLVULAS - Sistema</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#1d1f23; color:white; padding-bottom: 50px; }
        
        header { background:#24272c; padding:15px; }
        .topo { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; max-width: 1000px; margin: 0 auto; }
        .empresa h1 { font-size:18px; }
        .empresa p { font-size:12px; color:#4da3ff; }
        
        .abas { background:#24272c; display:flex; overflow-x:auto; border-bottom: 1px solid #32353b; justify-content: center; }
        .abas button { background:none; border:none; color:#a0a5b0; padding:15px; cursor:pointer; white-space:nowrap; }
        .abas button.ativa { border-bottom:3px solid #2196f3; color: white; font-weight: bold; }

        main { padding:20px; max-width: 800px; margin: 0 auto; }
        .conteudo-aba { display: none; }
        .conteudo-aba.ativo { display: block; }

        .card { background:#2b2e34; padding:20px; border-radius:15px; margin-bottom: 20px; }
        h2 { color: #4da3ff; margin-bottom: 15px; border-bottom: 1px solid #3a3d44; padding-bottom: 10px; }

        input, select, textarea { width:100%; padding:12px; margin-bottom:10px; border:none; border-radius:8px; background:#3a3d44; color:white; }
        
        button { cursor: pointer; border:none; border-radius:8px; padding:12px; font-weight:bold; transition: 0.2s; }
        .salvar, .btn-pdf { width: 100%; background: #2196f3; color: white; margin-top: 10px; }
        .btn-add { background: #4caf50; color: white; padding: 8px 15px; }
        .btn-excluir { background: #f44336; color: white; padding: 5px 10px; }
    </style>
</head>
<body>
    <header><div class="topo"><h1>AMM VÁLVULAS</h1></div></header>
    <div class="abas">
        <button class="btn-aba ativa" onclick="alert('Sistema pronto!')">Sistema Funcionando</button>
    </div>
    <main>
        <div class="card">
            <h2>Bem-vindo!</h2>
            <p>O site está no ar.</p>
        </div>
    </main>
</body>
</html>
