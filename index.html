<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMM VÁLVULAS - Sistema</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background:#121212; color:white; }

        /* HEADER */
        header { background:#1a1d23; padding: 20px; border-bottom: 2px solid #24272c; }
        .topo { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
        
        .logo-area { display: flex; flex-direction: column; gap: 2px; }
        .logo-area h1 { font-size: 20px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .logo-area p { font-size: 13px; color: #4da3ff; font-weight: bold; }
        
        .pesquisa-area { width: 400px; }
        .pesquisa-area input { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; }

        /* ABAS */
        .abas { background:#1a1d23; display:flex; overflow-x:auto; border-bottom: 1px solid #333; justify-content: center; padding: 10px 0; }
        .abas button { background:none; border:none; color:#777; padding:10px 15px; cursor:pointer; white-space:nowrap; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        .abas button.ativa { color: #2196f3; border-bottom: 2px solid #2196f3; }

        /* CONTEÚDO */
        main { padding:20px; max-width: 1000px; margin: 0 auto; }
        .conteudo-aba { display: none; }
        .conteudo-aba.ativo { display: block; }
        .card { background:#1a1d23; padding:25px; border-radius:10px; border: 1px solid #333; }
        h2 { color: #2196f3; font-size: 16px; margin-bottom: 20px; border-left: 4px solid #2196f3; padding-left: 10px; }

        /* FORMULÁRIO */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        label { font-size: 12px; color: #888; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #121212; color: #fff; }
        .full { grid-column: span 2; }
        .btn-salvar { width: 100%; padding: 15px; background: #2196f3; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* RESPONSIVIDADE CELULAR */
        @media (max-width: 768px) {
            .topo { flex-direction: column; align-items: center; text-align: center; }
            .pesquisa-area { width: 100%; }
            .form-grid { grid-template-columns: 1fr; }
            .full { grid-column: span 1; }
        }
    </style>
</head>
<body>

<header>
    <div class="topo">
        <div class="logo-area">
            <h1>AMM VÁLVULAS</h1>
            <p>CNPJ: 62.125.027/0001-68</p>
        </div>
        <div class="pesquisa-area">
            <input type="text" placeholder="Pesquisar por nome ou placa...">
        </div>
    </div>
</header>

<div class="abas">
    <button class="btn-aba ativa" onclick="abrirAba(event, 'cadastro')">1. CADASTRO</button>
    <button class="btn-aba" onclick="abrirAba(event, 'clientes')">2. CLIENTES</button>
    <button class="btn-aba" onclick="abrirAba(event, 'os')">3. NOVA OC</button>
    <button class="btn-aba" onclick="abrirAba(event, 'historico')">4. HISTÓRICO</button>
    <button class="btn-aba" onclick="abrirAba(event, 'financeiro')">5. FINANCEIRO</button>
    <button class="btn-aba" onclick="abrirAba(event, 'devedores')">6. DEVEDORES</button>
</div>

<main>
    <div id="cadastro" class="conteudo-aba ativo">
        <div class="card">
            <h2>CADASTRO DE CLIENTE</h2>
            <div class="form-grid">
                <div class="full"><label>Nome / Razão Social</label><input type="text"></div>
                <div><label>CPF / CNPJ</label><input type="text"></div>
                <div><label>WhatsApp</label><input type="text"></div>
                <div class="full"><label>E-mail</label><input type="email"></div>
                <div class="full"><label>Endereço Completo</label><input type="text"></div>
                <div class="full"><label>Cidade / UF</label><input type="text"></div>
            </div>
            <button class="btn-salvar">SALVAR CLIENTE</button>
        </div>
    </div>

    <div id="clientes" class="conteudo-aba"><div class="card"><h2>Lista de Clientes</h2></div></div>
    <div id="os" class="conteudo-aba"><div class="card"><h2>Nova Ordem de Serviço</h2></div></div>
    <div id="historico" class="conteudo-aba"><div class="card"><h2>Histórico</h2></div></div>
    <div id="financeiro" class="conteudo-aba"><div class="card"><h2>Financeiro</h2></div></div>
    <div id="devedores" class="conteudo-aba"><div class="card"><h2>Devedores</h2></div></div>
</main>

<script>
    function abrirAba(evt, nomeAba) {
        document.querySelectorAll('.conteudo-aba').forEach(a => a.style.display = 'none');
        document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('ativa'));
        document.getElementById(nomeAba).style.display = 'block';
        evt.currentTarget.classList.add('ativa');
    }
</script>

</body>
</html>
