<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMM VÁLVULAS - Sistema</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#1d1f23; color:white; padding-bottom: 50px; }
        
        /* Cabeçalho Ajustado */
        header { background:#24272c; padding:20px; border-bottom: 1px solid #32353b; }
        .topo { max-width: 1000px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
        
        .logo-area { display: flex; align-items: baseline; gap: 15px; }
        .logo-area h1 { font-size: 20px; color: #fff; }
        .logo-area p { font-size: 13px; color: #4da3ff; }
        
        .pesquisa-area { flex-grow: 1; max-width: 400px; }
        .pesquisa-area input { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #3a3d44; color: white; }

        /* Abas */
        .abas { background:#24272c; display:flex; overflow-x:auto; border-bottom: 1px solid #32353b; justify-content: center; }
        .abas button { background:none; border:none; color:#a0a5b0; padding:15px; cursor:pointer; white-space:nowrap; font-size: 14px; }
        .abas button.ativa { border-bottom:3px solid #2196f3; color: white; font-weight: bold; }

        main { padding:20px; max-width: 800px; margin: 0 auto; }
        .conteudo-aba { display: none; }
        .conteudo-aba.ativo { display: block; }
        .card { background:#2b2e34; padding:20px; border-radius:15px; margin-bottom: 20px; }
        h2 { color: #4da3ff; margin-bottom: 15px; border-bottom: 1px solid #3a3d44; padding-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <div class="topo">
        <div class="logo-area">
            <h1>AMM VÁLVULAS</h1>
            <p>CNPJ: 62.125.027/0001-68</p>
        </div>
        <div class="pesquisa-area">
            <input type="text" placeholder="Pesquisar por Nome ou Placa...">
        </div>
    </div>
</header>

<div class="abas">
    <button class="btn-aba ativa" onclick="abrirAba(event, 'cadastro')">Cadastro</button>
    <button class="btn-aba" onclick="abrirAba(event, 'clientes')">Clientes</button>
    <button class="btn-aba" onclick="abrirAba(event, 'os')">Nova OS</button>
    <button class="btn-aba" onclick="abrirAba(event, 'historico')">Histórico</button>
    <button class="btn-aba" onclick="abrirAba(event, 'financeiro')">Financeiro</button>
    <button class="btn-aba" onclick="abrirAba(event, 'devedores')">Devedores</button>
</div>

<main>
    <div id="cadastro" class="conteudo-aba ativo"><div class="card"><h2>Cadastro</h2></div></div>
    <div id="clientes" class="conteudo-aba"><div class="card"><h2>Clientes</h2></div></div>
    <div id="os" class="conteudo-aba"><div class="card"><h2>Nova OS</h2></div></div>
    <div id="historico" class="conteudo-aba"><div class="card"><h2>Histórico</h2></div></div>
    <div id="financeiro" class="conteudo-aba"><div class="card"><h2>Financeiro</h2></div></div>
    <div id="devedores" class="conteudo-aba"><div class="card"><h2>Devedores</h2></div></div>
</main>

<script>
    function abrirAba(evt, nomeAba) {
        document.querySelectorAll('.conteudo-aba').forEach(a => a.style.display = 'none');
        document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('ativa'));
        document.getElementById(nomeAba).style.display = 'block';
        evt.currentTarget.classList.add('ativa');
    }
</script>

</body>
</html>
