<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMM VÁLVULAS - Sistema</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background:#121212; color:white; }
        header { background:#1a1d23; padding: 15px; border-bottom: 2px solid #24272c; }
        .topo { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px; }
        .logo-area h1 { font-size: 18px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .logo-area p { font-size: 12px; color: #4da3ff; font-weight: bold; }
        .pesquisa-area { width: 100%; max-width: 300px; }
        .pesquisa-area input { width: 100%; padding: 10px 20px; border-radius: 25px; border: 2px solid #2196f3; background: #0d0d0d; color: #fff; font-size: 16px; outline: none; }
        .abas { background:#1a1d23; display:flex; overflow-x: auto; border-bottom: 1px solid #333; padding: 10px 5px; white-space: nowrap; }
        .abas button { background:none; border:none; color:#777; padding: 10px 12px; cursor:pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .abas button.ativa { color: #2196f3; border-bottom: 2px solid #2196f3; }
        main { padding: 15px; max-width: 1200px; margin: 0 auto; }
        .conteudo-aba { display: none; }
        .conteudo-aba.ativo { display: block; }
        .card { background:#1a1d23; padding: 15px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .btn-salvar { width: 100%; padding: 12px; border-radius: 20px; border: none; cursor: pointer; color: white; background: linear-gradient(90deg, #2196f3, #1565c0); }
        .cliente-caixa, .oc-caixa { background: #15181c; border: 1px solid #2d3139; padding: 15px; margin-bottom: 10px; border-radius: 12px; }
        .item-oc-linha { display: grid; grid-template-columns: 1fr; gap: 8px; background: #15181c; padding: 12px; border-radius: 10px; }
        .totais-oc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div id="conteudo-principal-sistema">
    <header>
        <div class="topo">
            <div class="logo-area"><h1>AMM VÁLVULAS</h1><p>CNPJ: 62.125.027/0001-68</p></div>
            <div class="pesquisa-area"><input type="text" id="campoPesquisa" placeholder="Pesquisar..." oninput="filtrarClientesGeral()"></div>
        </div>
    </header>

    <div class="abas">
        <button class="btn-aba ativa" id="aba-cadastro-btn" onclick="abrirAba(event, 'cadastro')">1. CADASTRO</button>
        <button class="btn-aba" id="aba-clientes-btn" onclick="abrirAba(event, 'clientes')">2. CLIENTES</button>
        <button class="btn-aba" id="aba-os-btn" onclick="abrirAba(event, 'os')">3. NOVA OC</button>
        <button class="btn-aba" id="aba-historico-btn" onclick="abrirAba(event, 'historico')">4. HISTÓRICO</button>
    </div>

    <main>
        <div id="cadastro" class="conteudo-aba ativo">
            <div class="card"><h2 id="titulo-form">CADASTRO DE CLIENTE</h2>
                <input type="hidden" id="editando-id">
                <div class="form-grid">
                    <input type="text" id="form-nome" placeholder="Nome">
                    <input type="text" id="form-documento" placeholder="CPF/CNPJ">
                    <input type="text" id="form-whatsapp" placeholder="WhatsApp">
                </div>
                <button class="btn-salvar" onclick="salvarCliente()">SALVAR CLIENTE</button>
            </div>
        </div>
        <div id="clientes" class="conteudo-aba"><div class="card"><h2>CLIENTES</h2><div id="lista-clientes"></div></div></div>
        <div id="os" class="conteudo-aba"><div class="card"><h2>NOVA OC</h2><div id="oc-itens-container"></div><button onclick="adicionarLinhaItem()">+ ADICIONAR ITEM</button></div></div>
        <div id="historico" class="conteudo-aba"><div class="card"><h2>HISTÓRICO</h2><div id="lista-historico"></div></div></div>
    </main>
</div>

<script>
    // Seus dados iniciais
    let clientesBD = [{ id: 1, nome: "AMM Válvulas Filial", documento: "62.125.027/0002-49", whatsapp: "(11) 98888-2222" }];
    let historicoOC = [];

    // Funções principais
    function abrirAba(evt, nomeAba) {
        document.querySelectorAll('.conteudo-aba').forEach(a => a.style.display = 'none');
        document.getElementById(nomeAba).style.display = 'block';
    }

    function salvarCliente() {
        const nome = document.getElementById('form-nome').value;
        const documento = document.getElementById('form-documento').value;
        const whatsapp = document.getElementById('form-whatsapp').value;
        clientesBD.push({ id: Date.now(), nome, documento, whatsapp });
        alert("Cliente Salvo!");
        abrirAba(null, 'clientes');
    }

    function renderizarClientes() {
        const grid = document.getElementById('lista-clientes');
        grid.innerHTML = clientesBD.map(c => `<div class="cliente-caixa">${c.nome}</div>`).join('');
    }
    
    // Inicialização
    renderizarClientes();
</script>
</body>
</html>
